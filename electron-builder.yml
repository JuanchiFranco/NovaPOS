appId: com.juanfranco.novapos
productName: NovaPOS
directories:
  buildResources: resources
  output: release
files:
  - out/**/*
  - package.json
extraResources:
  - from: prisma/schema.prisma
    to: prisma/schema.prisma
  - from: prisma/init.sql
    to: prisma/init.sql
  # electron-builder solo empaqueta node_modules que sean dependencias declaradas en
  # package.json; ".prisma/client" es generado por Prisma y no cuenta como tal, así que
  # se copia aparte (ver NODE_PATH en src/main/database/client.ts). "@prisma/client" se
  # duplica aquí también porque ".prisma/client/default.js" lo referencia internamente
  # y, al vivir fuera del asar, necesita resolverlo por la misma ruta NODE_PATH.
  - from: node_modules/.prisma/client
    to: .prisma/client
  - from: node_modules/@prisma/client
    to: '@prisma/client'
asarUnpack:
  - '**/*.node'
win:
  target: nsis
  icon: resources/icon.png
mac:
  target: dmg
  icon: resources/icon.png
  category: public.app-category.business
linux:
  target: AppImage
  icon: resources/icon.png
  category: Office
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
